name: Autograding Tests
on: push
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    # Pin Python to a numpy-2.1.x-compatible version. numpy 2.1.3 (the requirements pin)
    # has no cp314 wheels; running it on Python 3.14 triggers C-ABI undefined behaviour
    # (memory corruption in array math inside function frames). Keep this <= 3.13.
    - name: Set up Python (numpy 2.1.x needs Python <= 3.13)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    # Written-only units (e.g. U2b) have no test_hw.py and are rubric-graded. Detect that
    # so the pytest grader + reporter are skipped instead of failing on "no tests".
    - name: Detect tests
      id: detect
      run: |
        if [ -f test_hw.py ]; then
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_tests=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Correctness
      id: correctness
      if: steps.detect.outputs.has_tests == 'true'
      uses: classroom-resources/autograding-python-grader@v1
      with:
        timeout: 10
        setup-command: pip install -r requirements.txt
    - name: Autograding Reporter
      if: steps.detect.outputs.has_tests == 'true'
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CORRECTNESS_RESULTS: "${{steps.correctness.outputs.result}}"
      with:
        runners: correctness
    - name: Written-only (no autograder)
      if: steps.detect.outputs.has_tests == 'false'
      run: echo "This unit is rubric-graded (no test_hw.py); no autograder to run."
